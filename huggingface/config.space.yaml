# HF Space runtime lives in /root/.hermes and syncs to the mounted bucket at /data.
model:
  provider: "custom"
  default: "qwen3.6-plus"
  base_url: ""

display:
  skin: "default"

platform_toolsets:
  api_server:
    - "all"
  weixin:
    - "all"

terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  lifetime_seconds: 300
  docker_mount_cwd_to_workspace: false
  container_cpu: 1
  container_memory: 5120
